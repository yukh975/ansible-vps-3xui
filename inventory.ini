# =============================================================================
# inventory.ini — НЕ КОММИТИТЬ (в .gitignore)
# Скопировать из inventory.ini.example и заполнить
# =============================================================================

[new_vps]
vps1 ansible_host=YOUR_SERVER_IP

[new_vps:vars]
ansible_user=root
ansible_port=22
ansible_ssh_extra_args='-o StrictHostKeyChecking=no'

# Пароль не хранить в файле — передавать при запуске:
#   ansible-playbook -i inventory.ini site.yml --ask-pass
