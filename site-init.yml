---
# =============================================================================
# site-init.yml — STAGE 1: connects on port 22 as root
# Performs: OS upgrade, packages, users, SSH, sysctl, firewall
# After completion SSH moves to custom port (ssh_port), root is locked
#
# Run:
#   ansible-playbook -i inventory.ini site-init.yml
# =============================================================================

- name: "PLAY 1 :: OS upgrade and reboot"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: 22
    ansible_user: root
  roles:
    - role: bootstrap
      vars:
        bootstrap_phase: upgrade

- name: "PLAY 2 :: Packages, users, SSH, sysctl, firewall"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: 22
    ansible_user: root
  roles:
    - role: bootstrap
      vars:
        bootstrap_phase: init
