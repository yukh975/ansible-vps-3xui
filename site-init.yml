---
# =============================================================================
# site-init.yml — ЭТАП 1: подключается на порту 22 от root
# Выполняет: обновление ОС, пакеты, пользователи, SSH, sysctl, firewall
# После завершения SSH переключится на кастомный порт (ssh_port), root будет закрыт
#
# Запуск:
#   ansible-playbook -i inventory.ini site-init.yml
# =============================================================================

- name: "PLAY 1 :: Обновление ОС и перезагрузка"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: 22
    ansible_user: root
  roles:
    - role: bootstrap
      vars:
        bootstrap_phase: upgrade

- name: "PLAY 2 :: Пакеты, пользователи, SSH, sysctl, firewall"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: 22
    ansible_user: root
  roles:
    - role: bootstrap
      vars:
        bootstrap_phase: init
