---
- name: restart sshd
  systemd:
    name: ssh
    state: restarted

- name: reload sysctl
  command: sysctl --system
  changed_when: false

- name: restore iptables v4
  shell: iptables-restore < /etc/iptables/rules.v4
  changed_when: true

- name: restore iptables v6
  shell: ip6tables-restore < /etc/iptables/rules.v6
  changed_when: true

- name: restart caddy
  systemd:
    name: caddy
    state: restarted

- name: reload systemd and restart caddy
  systemd:
    name: caddy
    state: restarted
    daemon_reload: yes
