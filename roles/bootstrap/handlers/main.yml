---
- name: restart sshd
  systemd:
    name: ssh
    state: restarted

- name: reload sysctl
  command: sysctl --system
  changed_when: false

- name: restore iptables v4
  command: iptables-restore < /etc/iptables/rules.v4
  changed_when: true

- name: restore iptables v6
  command: ip6tables-restore < /etc/iptables/rules.v6
  changed_when: true
