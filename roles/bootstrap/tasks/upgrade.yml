---
# =============================================================================
# Phase upgrade: full OS upgrade and reboot
# =============================================================================

- name: "[upgrade] apt update"
  apt:
    update_cache: yes
    cache_valid_time: 0    # always refresh in this phase

- name: "[upgrade] apt full-upgrade"
  apt:
    upgrade: full
    autoremove: yes
    autoclean: yes
  register: _apt_upgrade

- name: "[upgrade] Reboot after upgrade"
  reboot:
    msg: "Reboot after apt full-upgrade"
    reboot_timeout: 300
    connect_timeout: 10
    pre_reboot_delay: 5
    post_reboot_delay: 15
    test_command: "systemctl is-system-running || true"
  when: _apt_upgrade.changed

- name: "[upgrade] Skip reboot (nothing changed)"
  debug:
    msg: "System is up to date, reboot not required"
  when: not _apt_upgrade.changed
