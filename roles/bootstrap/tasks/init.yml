---
# =============================================================================
# Фаза init: пакеты, пользователи, SSH, sysctl, firewall
# Работает на порту 22 от root
# В конце перезапускает sshd (новый порт) и перезагружает сервер
# =============================================================================

# ── Hostname ─────────────────────────────────────────────────────────────────

- name: "[hostname] Установить hostname"
  command: hostnamectl set-hostname {{ hostname }}

- name: "[hostname] Прописать в /etc/hosts"
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ hostname }} {{ hostname.split('.')[0] }}"

# ── Пакеты ───────────────────────────────────────────────────────────────────

- name: "[pkg] apt update"
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "[pkg] Установить необходимые пакеты"
  apt:
    name: "{{ extra_packages }}"
    state: present

# ── Пользователи (цикл, кроме root) ─────────────────────────────────────────

- name: "[users] Создать пользователя {{ item.key }}"
  user:
    name: "{{ item.key }}"
    groups: "{{ item.value.groups | default([]) | join(',') }}"
    append: yes
    shell: "{{ item.value.shell | default('/bin/bash') }}"
    password: "{{ item.value.password }}"
    create_home: yes
    state: present
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.key != 'root'

- name: "[users] Создать ~/.ssh для {{ item.key }}"
  file:
    path: "/home/{{ item.key }}/.ssh"
    state: directory
    owner: "{{ item.key }}"
    group: "{{ item.key }}"
    mode: "0700"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.key != 'root'
    - item.value.has_authorized_keys | default(false)

- name: "[users] authorized_keys для {{ item.key }}"
  copy:
    src: "files/{{ item.key }}/authorized_keys"
    dest: "/home/{{ item.key }}/.ssh/authorized_keys"
    owner: "{{ item.key }}"
    group: "{{ item.key }}"
    mode: "0600"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.key != 'root'
    - item.value.has_authorized_keys | default(false)

- name: "[users] .bashrc для {{ item.key }}"
  copy:
    src: "files/{{ item.key }}/.bashrc"
    dest: "/home/{{ item.key }}/.bashrc"
    owner: "{{ item.key }}"
    group: "{{ item.key }}"
    mode: "0644"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.key != 'root'
    - item.value.has_bashrc | default(false)

- name: "[users] sudo без пароля для {{ item.key }}"
  copy:
    dest: "/etc/sudoers.d/{{ item.key }}"
    content: "{{ item.key }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.key != 'root'
    - item.value.sudo_nopasswd | default(false)

# ── Root ─────────────────────────────────────────────────────────────────────

- name: "[users] Установить пароль root"
  user:
    name: root
    password: "{{ users.root.password }}"

- name: "[users] .bashrc для root"
  copy:
    src: "files/root/.bashrc"
    dest: /root/.bashrc
    owner: root
    group: root
    mode: "0644"
  when: users.root.has_bashrc | default(false)

# ── SSH hardening ─────────────────────────────────────────────────────────────

- name: "[ssh] Задеплоить sshd_config"
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "sshd -t -f %s"

- name: "[ssh] Убедиться что sshd запущен и включён"
  systemd:
    name: ssh
    state: started
    enabled: yes

# ── sysctl ────────────────────────────────────────────────────────────────────

- name: "[sysctl] Применить параметры"
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    state: present
    reload: yes
    sysctl_file: "{{ sysctl_dest }}"
  loop: "{{ sysctl_settings | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

# ── ipset ─────────────────────────────────────────────────────────────────────

- name: "[ipset] Создать set {{ ipset_set_name | default('allowed_hosts') }}"
  command: "ipset create {{ ipset_set_name | default('allowed_hosts') }} hash:ip -exist"
  changed_when: false
  when: ipset_hosts | default([]) | length > 0

- name: "[ipset] Очистить set {{ ipset_set_name | default('allowed_hosts') }}"
  command: "ipset flush {{ ipset_set_name | default('allowed_hosts') }}"
  changed_when: false
  when: ipset_hosts | default([]) | length > 0

- name: "[ipset] Добавить IP в {{ ipset_set_name | default('allowed_hosts') }}"
  command: "ipset add {{ ipset_set_name | default('allowed_hosts') }} {{ item }} -exist"
  loop: "{{ ipset_hosts | default([]) }}"
  changed_when: false
  when: ipset_hosts | default([]) | length > 0

- name: "[ipset] Сохранить ipset"
  shell: ipset save > /etc/ipset.conf
  changed_when: true
  when: ipset_hosts | default([]) | length > 0

- name: "[ipset] Включить netfilter-persistent"
  systemd:
    name: netfilter-persistent
    enabled: yes

# ── iptables ──────────────────────────────────────────────────────────────────

- name: "[iptables] Создать /etc/iptables"
  file:
    path: /etc/iptables
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "[iptables] Сгенерировать rules.v4"
  template:
    src: iptables_v4.j2
    dest: "{{ iptables_rules_v4_dest }}"
    owner: root
    group: root
    mode: "0640"

- name: "[iptables] Сгенерировать rules.v6"
  template:
    src: iptables_v6.j2
    dest: "{{ iptables_rules_v6_dest }}"
    owner: root
    group: root
    mode: "0640"

- name: "[iptables] Применить правила IPv4"
  shell: "iptables-restore < {{ iptables_rules_v4_dest }}"
  changed_when: true

- name: "[iptables] Применить правила IPv6"
  shell: "ip6tables-restore < {{ iptables_rules_v6_dest }}"
  changed_when: true

- name: "[iptables] netfilter-persistent save"
  command: netfilter-persistent save
  changed_when: true

# ── Перезагрузка ──────────────────────────────────────────────────────────────
# Перезагружаем через shell async — не ждём ответа от сервера.
# После перезагрузки sshd поднимется на новом порту с новым конфигом.
# Ansible завершает play успешно, не ожидая переподключения.

- name: "Перезагрузка сервера"
  shell: sleep 3 && reboot
  async: 10
  poll: 0
  ignore_errors: true

- name: "Ждём пока сервер перезагрузится"
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ ssh_port }}"
    delay: 20
    timeout: 300
    state: started
  delegate_to: localhost
  become: false

- name: "=== ЭТАП 1 ЗАВЕРШЁН ==="
  debug:
    msg:
      - "╔══════════════════════════════════════════════════════════╗"
      - "║   Этап 1 завершён                                        ║"
      - "╠══════════════════════════════════════════════════════════╣"
      - "║  SSH теперь на порту {{ ssh_port }}, root закрыт                    ║"
      - "║  Следующий шаг:                                          ║"
      - "║  ansible-playbook -i inventory.ini site-configure.yml    ║"
      - "╚══════════════════════════════════════════════════════════╝"
