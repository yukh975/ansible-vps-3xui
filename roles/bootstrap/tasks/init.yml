---
# =============================================================================
# Phase init: packages, users, SSH, sysctl, firewall
# Runs on port 22 as root
# At the end restarts sshd (new port) and reboots the server
# =============================================================================

# ── Hostname ──────────────────────────────────────────────────────────────────

- name: "[hostname] Set hostname"
  command: hostnamectl set-hostname {{ hostname }}

- name: "[hostname] Add to /etc/hosts"
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ hostname }} {{ hostname.split('.')[0] }}"

# ── Wait for cloud-init and apt lock ─────────────────────────────────────────
# Some hosting providers run apt full-upgrade right after provisioning.
# Wait for cloud-init to finish, then check that apt is not locked.
# Each failed attempt prints "RETRYING" — the user can see progress.

- name: "[pkg] Wait for cloud-init to finish"
  stat:
    path: /var/lib/cloud/instance/boot-finished
  register: _cloud_init
  until: _cloud_init.stat.exists
  retries: 10
  delay: 60
  changed_when: false
  failed_when: false

- name: "[pkg] Wait for apt lock to be released"
  shell: |
    ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
    ! fuser /var/lib/dpkg/lock >/dev/null 2>&1
  register: _apt_free
  until: _apt_free.rc == 0
  retries: 30
  delay: 60
  changed_when: false

# ── Packages ──────────────────────────────────────────────────────────────────

- name: "[pkg] apt update"
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "[pkg] Install mandatory packages"
  apt:
    name:
      - iptables
      - iptables-persistent
      - ipset
      - ipset-persistent
      - netfilter-persistent
      - sqlite3
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: "[pkg] Install extra packages"
  apt:
    name: "{{ extra_packages }}"
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

# ── Users (loop, except root) ─────────────────────────────────────────────────

- name: "[users] Create users"
  user:
    name: "{{ item.key }}"
    groups: "{{ item.value.groups | default([]) | join(',') }}"
    append: yes
    shell: "{{ item.value.shell | default('/bin/bash') }}"
    password: "{{ item.value.password }}"
    create_home: yes
    state: present
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.key != 'root'

- name: "[users] Create ~/.ssh"
  file:
    path: "{{ '/root/.ssh' if item.key == 'root' else '/home/' + item.key + '/.ssh' }}"
    state: directory
    owner: "{{ item.key }}"
    group: "{{ item.key if item.key != 'root' else 'root' }}"
    mode: "0700"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.value.ssh_public_keys | default([]) | length > 0

- name: "[users] SSH authorized_keys"
  copy:
    content: "{{ item.value.ssh_public_keys | join('\n') }}\n"
    dest: "{{ '/root/.ssh/authorized_keys' if item.key == 'root' else '/home/' + item.key + '/.ssh/authorized_keys' }}"
    owner: "{{ item.key }}"
    group: "{{ item.key if item.key != 'root' else 'root' }}"
    mode: "0600"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.value.ssh_public_keys | default([]) | length > 0


- name: "[users] Copy .bashrc"
  copy:
    src: "{{ item.key }}/.bashrc"
    dest: "{{ '/root/.bashrc' if item.key == 'root' else '/home/' + item.key + '/.bashrc' }}"
    owner: "{{ item.key }}"
    group: "{{ item.key if item.key != 'root' else 'root' }}"
    mode: "0644"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.value.has_bashrc | default(false)
    - lookup('fileglob', role_path + '/files/' + item.key + '/.bashrc') | length > 0

- name: "[users] sudo without password"
  copy:
    dest: "/etc/sudoers.d/{{ item.key }}"
    content: "{{ item.key }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ users | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.key != 'root'
    - item.value.sudo_nopasswd | default(false)

# ── Root ──────────────────────────────────────────────────────────────────────

- name: "[users] Set root password"
  user:
    name: root
    password: "{{ users.root.password }}"

# ── SSH hardening ─────────────────────────────────────────────────────────────

- name: "[ssh] Deploy sshd_config"
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: "sshd -t -f %s"

- name: "[ssh] Ensure sshd is running and enabled"
  systemd:
    name: ssh
    state: started
    enabled: yes

# ── sysctl ────────────────────────────────────────────────────────────────────

- name: "[sysctl] Load tcp_bbr module"
  command: modprobe tcp_bbr
  changed_when: false

- name: "[sysctl] Make tcp_bbr load persistent"
  copy:
    content: "tcp_bbr\n"
    dest: /etc/modules-load.d/tcp_bbr.conf
    owner: root
    group: root
    mode: "0644"

- name: "[sysctl] Write parameters to file"
  template:
    src: sysctl.conf.j2
    dest: "{{ sysctl_dest }}"
    owner: root
    group: root
    mode: "0644"

- name: "[sysctl] Apply parameters"
  command: sysctl --system
  changed_when: true

# ── ipset ─────────────────────────────────────────────────────────────────────
# Set is always created (even empty) — iptables references it in rules.

- name: "[ipset] Create set {{ ipset_set_name | default('allowed_hosts') }}"
  command: "ipset create {{ ipset_set_name | default('allowed_hosts') }} hash:ip -exist"
  changed_when: false

- name: "[ipset] Flush set {{ ipset_set_name | default('allowed_hosts') }}"
  command: "ipset flush {{ ipset_set_name | default('allowed_hosts') }}"
  changed_when: false

- name: "[ipset] Add IPs to {{ ipset_set_name | default('allowed_hosts') }}"
  command: "ipset add {{ ipset_set_name | default('allowed_hosts') }} {{ item }} -exist"
  loop: "{{ ipset_hosts | default([]) }}"
  changed_when: false
  when: ipset_hosts | default([]) | length > 0

- name: "[ipset] Enable netfilter-persistent"
  systemd:
    name: netfilter-persistent
    enabled: yes

# ── iptables ──────────────────────────────────────────────────────────────────

- name: "[iptables] Create /etc/iptables"
  file:
    path: /etc/iptables
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "[iptables] Generate rules.v4"
  template:
    src: iptables_v4.j2
    dest: "{{ iptables_rules_v4_dest }}"
    owner: root
    group: root
    mode: "0640"

- name: "[iptables] Generate rules.v6"
  template:
    src: iptables_v6.j2
    dest: "{{ iptables_rules_v6_dest }}"
    owner: root
    group: root
    mode: "0640"

# ── Final preparation and reboot ──────────────────────────────────────────────
# iptables is applied right before reboot — connection drop doesn't matter,
# since reboot is already running async. After reboot the rules
# are picked up by netfilter-persistent.

- name: "Apply firewall, clear root keys and reboot"
  shell: |
    rm -f /root/.ssh/authorized_keys
    iptables-restore < {{ iptables_rules_v4_dest }}
    ip6tables-restore < {{ iptables_rules_v6_dest }}
    netfilter-persistent save
    sleep 3 && reboot
  async: 30
  poll: 0
  ignore_errors: true

- name: "Wait for server to reboot"
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ ssh_port }}"
    delay: 20
    timeout: 300
    state: started
  delegate_to: localhost
  become: false

- name: "=== STAGE 1 COMPLETE ==="
  debug:
    msg:
      - "╔══════════════════════════════════════════════════════════╗"
      - "║   Stage 1 complete                                       ║"
      - "╠══════════════════════════════════════════════════════════╣"
      - "║  SSH is now on port {{ ssh_port }}, root is locked                  ║"
      - "║  Next step:                                              ║"
      - "║  ansible-playbook -i inventory.ini site-configure.yml    ║"
      - "╚══════════════════════════════════════════════════════════╝"
