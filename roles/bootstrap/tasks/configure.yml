---
# =============================================================================
# Фаза configure: 3x-ui, Caddy + ACME, cert-sync, финальная перезагрузка
# Работает на порту {{ ssh_port }} от {{ deploy_user }}
# =============================================================================

# ── 3x-ui ─────────────────────────────────────────────────────────────────────

- name: "[3xui] Проверить — уже установлен?"
  stat:
    path: /usr/local/x-ui/x-ui
  register: _xui_binary
  when: install_3xui | default(true)

- name: "[3xui] Установить 3x-ui"
  shell: |
    set -euo pipefail
    VER="{{ xui_version | default('') }}"
    if [[ -n "$VER" ]]; then
      bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh) "$VER" <<< "n"
    else
      bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh) <<< "n"
    fi
  args:
    executable: /bin/bash
  async: 360
  poll: 15
  when:
    - install_3xui | default(true)
    - not _xui_binary.stat.exists

- name: "[3xui] Остановить x-ui перед заменой БД"
  systemd:
    name: x-ui
    state: stopped
  ignore_errors: true
  when: install_3xui | default(true)

- name: "[3xui] Создать /etc/x-ui"
  file:
    path: /etc/x-ui
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: install_3xui | default(true)

- name: "[3xui] Залить x-ui.db"
  copy:
    src: "{{ xui_db_src }}"
    dest: "{{ xui_db_dest }}"
    owner: root
    group: root
    mode: "0600"
    backup: yes
  when: install_3xui | default(true)

- name: "[3xui] Обновить пути к сертификатам в БД"
  command: >
    sqlite3 {{ xui_db_dest }}
    "UPDATE settings SET value='{{ certs_dest_dir }}/{{ domain }}.crt' WHERE key='webCertFile';
     UPDATE settings SET value='{{ certs_dest_dir }}/{{ domain }}.key' WHERE key='webKeyFile';"
  when: install_3xui | default(true)

- name: "[3xui] Включить x-ui в автозагрузку"
  systemd:
    name: x-ui
    enabled: yes
    daemon_reload: yes
  when: install_3xui | default(true)

# ── Caddy ─────────────────────────────────────────────────────────────────────

- name: "[caddy] Проверить — уже установлен?"
  stat:
    path: /usr/bin/caddy
  register: _caddy_binary

- name: "[caddy] Установить зависимости"
  apt:
    name: [debian-keyring, debian-archive-keyring, apt-transport-https, curl]
    state: present
  when: not _caddy_binary.stat.exists

- name: "[caddy] Добавить GPG ключ репозитория"
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
    | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  when: not _caddy_binary.stat.exists

- name: "[caddy] Добавить репозиторий"
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
    | tee /etc/apt/sources.list.d/caddy-stable.list
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/caddy-stable.list
  when: not _caddy_binary.stat.exists

- name: "[caddy] apt update"
  apt:
    update_cache: yes
  when: not _caddy_binary.stat.exists

- name: "[caddy] Установить Caddy"
  apt:
    name: caddy
    state: present

- name: "[caddy] Создать /etc/caddy"
  file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "[caddy] Сгенерировать Caddyfile"
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: restart caddy

# ── cert-sync ─────────────────────────────────────────────────────────────────
# cert-sync копирует сертификаты Caddy в certs_dest_dir и перезапускает x-ui.
# Запускается через ExecStartPost при каждом старте Caddy — в том числе
# после автообновления сертификата (Caddy перезапускает себя при обновлении).

- name: "[cert-sync] Создать каталог для сертификатов"
  file:
    path: "{{ certs_dest_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "[cert-sync] Установить скрипт"
  template:
    src: cert-sync.sh.j2
    dest: /usr/local/bin/cert-sync.sh
    owner: root
    group: root
    mode: "0755"

- name: "[cert-sync] Создать каталог для systemd override"
  file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "[cert-sync] Установить systemd override для Caddy"
  template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/cert-sync.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd and restart caddy

- name: "[caddy] Включить Caddy в автозагрузку"
  systemd:
    name: caddy
    enabled: yes
    daemon_reload: yes

# ── Финальная перезагрузка ────────────────────────────────────────────────────
# После перезагрузки Caddy стартует, получает сертификат,
# cert-sync копирует его в certs_dest_dir, x-ui перезапускается.

- name: "Финальная перезагрузка"
  reboot:
    msg: "Final reboot after full provisioning"
    reboot_timeout: 300
    connect_timeout: 15
    pre_reboot_delay: 3
    post_reboot_delay: 30

- name: "Проверить статус x-ui"
  systemd:
    name: x-ui
  register: _xui_status
  when: install_3xui | default(true)

- name: "Проверить статус caddy"
  systemd:
    name: caddy
  register: _caddy_status

- name: "=== ГОТОВО ==="
  debug:
    msg:
      - "╔══════════════════════════════════════════════════════════╗"
      - "║   Нода готова к работе                                   ║"
      - "╠══════════════════════════════════════════════════════════╣"
      - "║  IP:      {{ ansible_host }}"
      - "║  SSH:     порт {{ ssh_port }}, root закрыт"
      - "║  x-ui:    {{ _xui_status.status.ActiveState | default('не установлен') }}"
      - "║  caddy:   {{ _caddy_status.status.ActiveState }}"
      - "║  ACME:    сертификат будет получен при первом старте Caddy"
      - "╠══════════════════════════════════════════════════════════╣"
      - "║  Если Ansible больше не нужен — удалите технического     ║"
      - "║  пользователя:                                           ║"
      - "║  userdel -r {{ deploy_user }}"
      - "╚══════════════════════════════════════════════════════════╝"
