---
# =============================================================================
# Phase configure: 3x-ui, Caddy + ACME, final reboot
# Runs on port {{ ssh_port }} as {{ deploy_user }}
# =============================================================================

# ── 3x-ui ─────────────────────────────────────────────────────────────────────

- name: "[3xui] Check — already installed?"
  stat:
    path: /usr/local/x-ui/x-ui
  register: _xui_binary
  when: install_3xui | default(true)

- name: "[3xui] Install 3x-ui"
  shell: |
    set -euo pipefail
    VER="{{ xui_version | default('') }}"
    if [[ -n "$VER" ]]; then
      bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh) "$VER" <<< "n"
    else
      bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh) <<< "n"
    fi
  args:
    executable: /bin/bash
  async: 360
  poll: 15
  when:
    - install_3xui | default(true)
    - not _xui_binary.stat.exists

- name: "[3xui] Stop x-ui before replacing DB"
  systemd:
    name: x-ui
    state: stopped
  ignore_errors: true
  when: install_3xui | default(true)

- name: "[3xui] Create /etc/x-ui"
  file:
    path: /etc/x-ui
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: install_3xui | default(true)

- name: "[3xui] Upload x-ui.db"
  copy:
    src: "{{ xui_db_src }}"
    dest: "{{ xui_db_dest }}"
    owner: root
    group: root
    mode: "0600"
    backup: yes
  when: install_3xui | default(true)

- name: "[3xui] Update panel settings in DB"
  shell: |
    sqlite3 {{ xui_db_dest }} "
      UPDATE settings SET value=''              WHERE key='webCertFile';
      UPDATE settings SET value=''              WHERE key='webKeyFile';
      UPDATE settings SET value='127.0.0.1'    WHERE key='webListen';
      INSERT OR REPLACE INTO settings (key, value) VALUES ('webBasePath', '{{ xui_panel_path }}');
    "
  changed_when: true
  when: install_3xui | default(true)

- name: "[3xui] Enable x-ui at startup"
  systemd:
    name: x-ui
    enabled: yes
    daemon_reload: yes
  when: install_3xui | default(true)

# ── Caddy ─────────────────────────────────────────────────────────────────────

- name: "[caddy] Check — already installed?"
  stat:
    path: /usr/bin/caddy
  register: _caddy_binary

- name: "[caddy] Install dependencies"
  apt:
    name: [debian-keyring, debian-archive-keyring, apt-transport-https, curl]
    state: present
  when: not _caddy_binary.stat.exists

- name: "[caddy] Add repository GPG key"
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
    | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  when: not _caddy_binary.stat.exists

- name: "[caddy] Add repository"
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
    | tee /etc/apt/sources.list.d/caddy-stable.list
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/caddy-stable.list
  when: not _caddy_binary.stat.exists

- name: "[caddy] apt update"
  apt:
    update_cache: yes
  when: not _caddy_binary.stat.exists

- name: "[caddy] Install Caddy"
  apt:
    name: caddy
    state: present

- name: "[caddy] Create /etc/caddy"
  file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "[caddy] Generate Caddyfile"
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: restart caddy

- name: "[caddy] Enable Caddy at startup"
  systemd:
    name: caddy
    enabled: yes
    daemon_reload: yes

# ── Final reboot and readiness wait ───────────────────────────────────────────

- name: "Final reboot"
  reboot:
    msg: "Final reboot after full provisioning"
    reboot_timeout: 300
    connect_timeout: 15
    pre_reboot_delay: 3
    post_reboot_delay: 30

# Wait for Caddy to obtain certificate via ACME (up to 5 minutes)
- name: "Wait for Caddy certificate (ACME)"
  wait_for:
    path: "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ hostname }}/{{ hostname }}.crt"
    timeout: 300

- name: "Start x-ui"
  systemd:
    name: x-ui
    state: started
  when: install_3xui | default(true)

- name: "Check x-ui status"
  systemd:
    name: x-ui
  register: _xui_status
  when: install_3xui | default(true)

- name: "Check caddy status"
  systemd:
    name: caddy
  register: _caddy_status

- name: "=== DONE ==="
  debug:
    msg:
      - "╔══════════════════════════════════════════════════════════╗"
      - "║   Node is ready                                          ║"
      - "╠══════════════════════════════════════════════════════════╣"
      - "║  IP:      {{ ansible_host }}"
      - "║  SSH:     port {{ ssh_port }}, root locked"
      - "║  x-ui:    {{ _xui_status.status.ActiveState | default('not installed') }}"
      - "║  caddy:   {{ _caddy_status.status.ActiveState }}"
      - "║  TLS:     certificate obtained (Caddy)"
      - "╠══════════════════════════════════════════════════════════╣"
      - "║  If Ansible is no longer needed — delete the technical   ║"
      - "║  user:                                                   ║"
      - "║  userdel -r {{ deploy_user }}"
      - "╚══════════════════════════════════════════════════════════╝"
