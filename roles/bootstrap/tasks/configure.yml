---
# =============================================================================
# Фаза configure: 3x-ui, Caddy, финальная перезагрузка
# Работает на порту 275 от yukh
# =============================================================================

# ── 3x-ui ─────────────────────────────────────────────────────────────────────

- name: "[3xui] Проверить — уже установлен?"
  stat:
    path: /usr/local/x-ui/x-ui
  register: _xui_binary

- name: "[3xui] Установить 3x-ui"
  shell: |
    set -euo pipefail
    VER="{{ xui_version | default('') }}"
    if [[ -n "$VER" ]]; then
      bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh) "$VER" <<< "n"
    else
      bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/install.sh) <<< "n"
    fi
  args:
    executable: /bin/bash
  async: 360
  poll: 15
  when: not _xui_binary.stat.exists

- name: "[3xui] Остановить x-ui перед заменой БД"
  systemd:
    name: x-ui
    state: stopped
  ignore_errors: true

- name: "[3xui] Создать /etc/x-ui"
  file:
    path: /etc/x-ui
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "[3xui] Залить x-ui.db"
  copy:
    src: "{{ xui_db_src }}"
    dest: "{{ xui_db_dest }}"
    owner: root
    group: root
    mode: "0600"
    backup: yes

- name: "[3xui] Включить x-ui в автозагрузку"
  systemd:
    name: x-ui
    enabled: yes
    daemon_reload: yes

# ── Caddy ─────────────────────────────────────────────────────────────────────

- name: "[caddy] Проверить — уже установлен?"
  stat:
    path: /usr/bin/caddy
  register: _caddy_binary

- name: "[caddy] Установить зависимости"
  apt:
    name: [debian-keyring, debian-archive-keyring, apt-transport-https, curl]
    state: present
  when: not _caddy_binary.stat.exists

- name: "[caddy] Добавить GPG ключ репозитория"
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
    | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  when: not _caddy_binary.stat.exists

- name: "[caddy] Добавить репозиторий"
  shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
    | tee /etc/apt/sources.list.d/caddy-stable.list
  args:
    executable: /bin/bash
    creates: /etc/apt/sources.list.d/caddy-stable.list
  when: not _caddy_binary.stat.exists

- name: "[caddy] apt update"
  apt:
    update_cache: yes
  when: not _caddy_binary.stat.exists

- name: "[caddy] Установить Caddy"
  apt:
    name: caddy
    state: present

- name: "[caddy] Создать /etc/caddy"
  file:
    path: /etc/caddy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "[caddy] Доставить Caddyfile"
  copy:
    src: "files/Caddyfile"
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: restart caddy

- name: "[caddy] Дать права caddy на каталог /home/ca"
  file:
    path: /home/ca
    owner: caddy
    recurse: yes

- name: "[caddy] Добавить пользователя caddy в группу ca"
  user:
    name: caddy
    groups: ca
    append: yes

- name: "[caddy] Включить Caddy в автозагрузку"
  systemd:
    name: caddy
    enabled: yes
    daemon_reload: yes

# ── Финальная перезагрузка ────────────────────────────────────────────────────

- name: "Финальная перезагрузка"
  reboot:
    msg: "Final reboot after full provisioning"
    reboot_timeout: 300
    connect_timeout: 15
    pre_reboot_delay: 3
    post_reboot_delay: 20
    test_command: "systemctl is-active x-ui"

- name: "Проверить статус x-ui"
  systemd:
    name: x-ui
  register: _xui_status

- name: "Проверить статус caddy"
  systemd:
    name: caddy
  register: _caddy_status

- name: "=== ГОТОВО ==="
  debug:
    msg:
      - "╔══════════════════════════════════════════════════╗"
      - "║   Нода готова к работе                           ║"
      - "╠══════════════════════════════════════════════════╣"
      - "║  IP:      {{ ansible_host }}                         ║"
      - "║  SSH:     порт {{ ssh_port }}, root закрыт                  ║"
      - "║  x-ui:    {{ _xui_status.status.ActiveState }}                                 ║"
      - "║  caddy:   {{ _caddy_status.status.ActiveState }}                                 ║"
      - "╚══════════════════════════════════════════════════╝"
