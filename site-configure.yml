---
# =============================================================================
# site-configure.yml — STAGE 2: connects on ssh_port as deploy_user
# Performs: 3x-ui install, Caddy, DB upload, final reboot
#
# Run:
#   ansible-playbook -i inventory.ini site-configure.yml
# =============================================================================

- name: "PLAY 3 :: 3x-ui, Caddy, final reboot"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: "{{ ssh_port }}"
    ansible_user: "{{ deploy_user }}"
  roles:
    - role: bootstrap
      vars:
        bootstrap_phase: configure
