---
# =============================================================================
# site-configure.yml — ЭТАП 2: подключается на кастомном порту от deploy_user
# Выполняет: установка 3x-ui, Caddy, загрузка БД, финальная перезагрузка
#
# Запуск:
#   ansible-playbook -i inventory.ini site-configure.yml
# =============================================================================

- name: "PLAY 3 :: 3x-ui, Caddy, финальная перезагрузка"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: "{{ ssh_port }}"
    ansible_user: "{{ deploy_user }}"
  roles:
    - role: bootstrap
      vars:
        bootstrap_phase: configure
