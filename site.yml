---
# =============================================================================
# site.yml — точка входа
#
# Запуск:
#   ansible-playbook -i inventory.ini site.yml --ask-pass
#
# PLAY 1 и PLAY 2 работают на порту 22 (стандартный, до hardening)
# PLAY 2 в конце меняет порт на 275 и перезагружает машину
# После перезагрузки Ansible переподключается уже на порт 275
# =============================================================================

- name: "PLAY 1 :: Обновление ОС и перезагрузка"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: 22        # до hardening всегда 22
  roles:
    - role: bootstrap
      tags: [bootstrap]
      vars:
        bootstrap_phase: upgrade

- name: "PLAY 2 :: Hardening, пакеты, пользователи, firewall, 3x-ui"
  hosts: new_vps
  become: true
  gather_facts: true
  vars:
    ansible_port: 22        # весь play идёт на порту 22
                            # порт меняется внутри play (sshd_config)
                            # финальная перезагрузка в configure.yml
                            # явно использует ssh_port (275)
  roles:
    - role: bootstrap
      tags: [bootstrap]
      vars:
        bootstrap_phase: configure
